<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de propuestas · Sala Maternal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,600&family=Dancing+Script:wght@600;700&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#7a1152;
    --paper:#fff1f6;
    --card:#ffffff;
    --grape:#e0308a;
    --coral:#ff6fa5;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Manrope',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .gate{
    background:var(--card);
    border:3px solid var(--ink);
    border-radius:28px;
    box-shadow:10px 10px 0 var(--grape);
    max-width:440px;
    width:100%;
    padding:40px 34px;
    text-align:center;
  }
  .eyebrow{
    display:inline-block;
    font-weight:800;
    font-size:12px;
    letter-spacing:.14em;
    text-transform:uppercase;
    background:var(--ink);
    color:var(--paper);
    padding:6px 14px;
    border-radius:100px;
    margin-bottom:18px;
  }
  h1{
    font-family:'Playfair Display',serif;
    font-weight:800;
    font-size:30px;
    line-height:1.1;
    margin:0 0 12px;
  }
  h1 em{color:var(--grape);font-style:italic;}
  .signature{font-family:'Dancing Script',cursive;font-weight:700;text-transform:none;}
  .eyebrow .signature{font-size:15px;}
  footer .signature{font-size:14px;}
  p.lede{
    font-size:15.5px;
    line-height:1.55;
    color:#5c1f42;
    margin:0 0 26px;
  }
  label{
    display:block;
    text-align:left;
    font-weight:800;
    font-size:12.5px;
    letter-spacing:.05em;
    text-transform:uppercase;
    margin-bottom:6px;
  }
  input{
    width:100%;
    font-family:'Manrope',sans-serif;
    font-size:15px;
    padding:12px 14px;
    border:2.5px solid var(--ink);
    border-radius:12px;
    margin-bottom:16px;
    background:var(--paper);
    color:var(--ink);
  }
  input::placeholder{color:#c98ab0;}
  .consent{
    display:flex;
    align-items:flex-start;
    gap:9px;
    text-align:left;
    margin-bottom:20px;
  }
  .consent input[type="checkbox"]{
    width:auto;
    margin:3px 0 0;
    padding:0;
    accent-color:var(--grape);
    flex-shrink:0;
  }
  .consent label{
    font-weight:600;
    font-size:13px;
    text-transform:none;
    letter-spacing:normal;
    margin-bottom:0;
    line-height:1.4;
  }
  button{
    width:100%;
    font-family:'Manrope',sans-serif;
    font-weight:800;
    font-size:16px;
    color:var(--paper);
    background:var(--ink);
    border:none;
    border-radius:100px;
    padding:16px;
    cursor:pointer;
    box-shadow:5px 5px 0 var(--grape);
    transition:transform .12s ease;
  }
  button:hover{transform:translate(-2px,-2px);}
  button:disabled{opacity:.6;cursor:not-allowed;}
  .status{
    font-size:13.5px;
    margin-top:14px;
    min-height:18px;
    font-weight:700;
  }
  .status.error{color:#c0264f;}
  .status.ok{color:#0d7d55;}
  footer{
    margin-top:24px;
    font-size:12px;
    color:#a35c80;
  }
</style>
</head>
<body>
  <div class="gate">
    <span class="eyebrow"><span class="signature">Karina Doello</span></span>
    <h1>Generador de <em>propuestas</em><br>para sala maternal</h1>
    <p class="lede">Dejanos tu nombre y tu mail para acceder al generador de actividades para docentes de jardín maternal.</p>
    <form id="gate-form">
      <input type="hidden" name="access_key" value="d15a37e038034dfdbdac0feefce037c9">
      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="tu@mail.com" required>
      <div class="consent">
        <input type="checkbox" id="consentimiento" required>
        <label for="consentimiento">Acepto recibir material y novedades por mail.</label>
      </div>
      <button type="submit" id="submit-btn">Ingresar al generador →</button>
      <div class="status" id="status"></div>
    </form>
    <footer>© <span class="signature">Karina Doello</span> — Tecnología que abraza</footer>
  </div>

<script>
const FORM_ENDPOINT = "https://splitforms.com/api/submit";
const DESTINO = "generador-maternal.html"; // el generador debe estar en la misma carpeta/repo

const form = document.getElementById("gate-form");
const statusEl = document.getElementById("status");
const btn = document.getElementById("submit-btn");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const nombre = document.getElementById("nombre").value.trim();
  const email = document.getElementById("email").value.trim();
  if(!nombre || !email) return;

  btn.disabled = true;
  statusEl.textContent = "Enviando...";
  statusEl.className = "status";

  try{
    const res = await fetch(FORM_ENDPOINT, {
      method: "POST",
      headers: {"Accept":"application/json"},
      body: new FormData(form)
    });
    if(res.ok){
      statusEl.textContent = "¡Listo! Redirigiendo...";
      statusEl.className = "status ok";
      setTimeout(() => { window.location.href = DESTINO; }, 900);
    } else {
      throw new Error("fallo el envío");
    }
  } catch(err){
    statusEl.textContent = "No se pudo registrar. Probá de nuevo.";
    statusEl.className = "status error";
    btn.disabled = false;
  }
});
</script>
</body>
</html>
